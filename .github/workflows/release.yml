name: Release

on:
  push:
    branches:
      - main
    tags:
      - "*.*.*"
    paths:
      - "manifest.json"
      - "package.json"
      - "package-lock.json"
      - "versions.json"
      - ".github/workflows/release.yml"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag. Must match manifest.json version exactly."
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Resolve release metadata
        shell: pwsh
        run: |
          $manifest = Get-Content manifest.json | ConvertFrom-Json
          $package = Get-Content package.json | ConvertFrom-Json
          $versions = Get-Content versions.json | ConvertFrom-Json
          $tag = '${{ github.event.inputs.tag }}'
          $shouldRelease = $true

          if ($package.version -ne $manifest.version)
          {
          	throw "package.json version '$($package.version)' must match manifest version '$($manifest.version)'."
          }

          $versionEntry = $versions.PSObject.Properties[$manifest.version]

          if (-not $versionEntry)
          {
          	throw "versions.json must contain an entry for version '$($manifest.version)'."
          }

          if ($versionEntry.Value -ne $manifest.minAppVersion)
          {
          	throw "versions.json maps '$($manifest.version)' to '$($versionEntry.Value)', but manifest minAppVersion is '$($manifest.minAppVersion)'."
          }

          if ($manifest.id -match '(?i)obsidian')
          {
          	throw "Plugin id '$($manifest.id)' must not contain 'obsidian'."
          }

          if ([string]::IsNullOrWhiteSpace($tag))
          {
          	if ('${{ github.ref_type }}' -eq 'tag')
          	{
          		$tag = '${{ github.ref_name }}'
          	}
          	else
          	{
          		$tag = $manifest.version
          	}
          }

          if ([string]::IsNullOrWhiteSpace($tag))
          {
          	throw "Release tag is empty."
          }

          if ($tag -ne $manifest.version)
          {
          	throw "Release tag '$tag' must match manifest version '$($manifest.version)'."
          }

          if ('${{ github.event_name }}' -eq 'push' -and '${{ github.ref_type }}' -ne 'tag')
          {
          	git show-ref --tags --verify --quiet "refs/tags/$tag"

          	if ($LASTEXITCODE -eq 0)
          	{
          		$shouldRelease = $false
          		Write-Host "Version $tag already has a Git tag. Skipping automatic release."
          	}
          	elseif ($LASTEXITCODE -ne 1)
          	{
          		throw "Failed to inspect existing Git tags."
          	}
          }

          "PLUGIN_ID=$($manifest.id)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "PLUGIN_VERSION=$($manifest.version)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "RELEASE_TAG=$tag" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "RELEASE_ZIP_NAME=$($manifest.id)-$($manifest.version).zip" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "SHOULD_RELEASE=$($shouldRelease.ToString().ToLowerInvariant())" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install dependencies
        if: env.SHOULD_RELEASE == 'true'
        run: npm ci

      - name: Build plugin
        if: env.SHOULD_RELEASE == 'true'
        run: npm run build

      - name: Package release bundle
        if: env.SHOULD_RELEASE == 'true'
        shell: pwsh
        run: |
          $releaseDir = Join-Path $PWD "release"

          if (Test-Path $releaseDir)
          {
          	Remove-Item -LiteralPath $releaseDir -Recurse -Force
          }

          New-Item -ItemType Directory -Path $releaseDir | Out-Null
          Copy-Item -LiteralPath @("main.js", "manifest.json", "styles.css") -Destination $releaseDir

          $zipPath = Join-Path $PWD $env:RELEASE_ZIP_NAME

          if (Test-Path $zipPath)
          {
          	Remove-Item -LiteralPath $zipPath -Force
          }

          Compress-Archive -Path (Join-Path $releaseDir "*") -DestinationPath $zipPath -CompressionLevel Optimal

      - name: Upload workflow artifact
        if: env.SHOULD_RELEASE == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: release-bundle
          path: |
            main.js
            manifest.json
            styles.css
            ${{ env.RELEASE_ZIP_NAME }}

      - name: Publish GitHub release
        if: env.SHOULD_RELEASE == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: |
            main.js
            manifest.json
            styles.css
            ${{ env.RELEASE_ZIP_NAME }}

      - name: Skip existing release
        if: env.SHOULD_RELEASE != 'true'
        shell: pwsh
        run: Write-Host "Release $env:RELEASE_TAG already exists. Nothing to publish."
